{{ define "main" }}
  <article class="article">
    <!-- Header -->
    <section style="padding-top: 24px">
      <div class="muted" style="font-size: 0.95rem">{{ .Date.Format "January 2, 2006" }}</div>
      <h1 style="font-size: 2.2rem; margin: 10px 0">{{ .Title }}</h1>
      {{ with .Params.summary }}
        <p class="lead">{{ . }}</p>
      {{ end }}

      {{ with .Params.tags }}
        <div class="tagrow" style="margin-top:16px">
          {{ range . }}
            <span class="badge" style="background: rgba(124, 58, 237, 0.15); border-color: var(--accent); color: var(--accent)">{{ . }}</span>
          {{ end }}
        </div>
      {{ end }}
    </section>

    <!-- Featured Image -->
    {{ with .Params.featured }}
      <div class="posthero">
        <img src="{{ . | relURL }}" alt="{{ $.Title }}" loading="lazy">
      </div>
    {{ end }}

    <!-- Content -->
    <section class="section">
      <div class="content" style="max-width: 75ch; margin: 0 auto">
        {{ .Content }}
      </div>
    </section>

    <!-- Back Navigation -->
    <section class="section">
      <a class="btn btn-outline" href="{{ "posts/" | relURL }}">← Back to News</a>
    </section>
  </article>
{{ end }}
