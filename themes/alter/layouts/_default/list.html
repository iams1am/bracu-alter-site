{{ define "main" }}
  <header class="page-header">
    <h1>{{ .Title }}</h1>
    {{ with .Params.description }}<p class="muted">{{ . }}</p>{{ end }}
  </header>

  <div class="grid">
    {{ range .Pages }}
      <a class="card" href="{{ .RelPermalink }}">
        <h3>{{ .Title }}</h3>
        {{ with .Params.summary }}<p class="muted">{{ . }}</p>{{ end }}
      </a>
    {{ end }}
  </div>
{{ end }}
