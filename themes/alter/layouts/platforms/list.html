{{ define "main" }}
  <!-- Header -->
  <section style="padding-top: 24px">
    <h1 style="font-size: 2.5rem; margin-bottom: 12px">{{ .Title }}</h1>
    {{ with .Params.description }}
      <p class="lead">{{ . }}</p>
    {{ end }}
  </section>

  <!-- Content -->
  {{ if .Content }}
    <section class="section">
      <div class="content" style="max-width: 80ch">
        {{ .Content }}
      </div>
    </section>
  {{ end }}

  <!-- Platform Categories -->
  <section class="section">
    <h2 style="margin-bottom: 16px">Platform Categories</h2>
    <div class="grid">
      {{ range .Pages }}
        <a class="card" href="{{ .RelPermalink }}" style="transition: all .2s ease; text-decoration: none">
          <h3 style="margin: 0 0 8px">{{ .Title }}</h3>
          {{ with .Params.summary }}
            <p class="muted" style="margin: 0">{{ . }}</p>
          {{ end }}
          <div style="margin-top: 12px; color: var(--accent); font-weight: 600">Explore →</div>
        </a>
      {{ end }}
    </div>
  </section>
{{ end }}
