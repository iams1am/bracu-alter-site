team:
  title: "Meet Our Team"
  subtitle: "A multidisciplinary group of engineers and researchers building the future of rescue robotics."
  years:
    - year: "2026"
      tagline: "Pushing boundaries at RoboCup 2026"
      description: "The current roster preparing for the next global stage, combining veteran experience with fresh talent across mechanical, embedded, AI, and autonomy sub-teams."
      image: "images/posts/pic7.png"
      href: "/team/2026/"
      color: "#FF4500"
      badges: ["Mechanical", "Embedded", "AI/Perception", "Autonomy"]
    - year: "2025"
      tagline: "Bangladesh's sole team at RoboCup Rescue, Brazil"
      description: "Represented Bangladesh as the only team at the World Championship in Salvador, Brazil. Engineered a competition-ready rover under intense time and resource constraints."
      image: "images/posts/pic7.png"
      href: "/team/2025/"
      color: "#FF6A00"
      badges: ["RoboCup 2025", "Salvador, Brazil", "World Championship"]
    - year: "2024"
      tagline: "RoboCup Rescue finalists in Eindhoven"
      description: "Reached the finals of RoboCup Rescue Robot League 2024 in Eindhoven, Netherlands. Won IDEA Innovation 5.0 and received the VC's Special Recognition Award."
      image: "images/posts/pic7.png"
      href: "/team/2024/"
      color: "#FF8C00"
      badges: ["RoboCup Finals", "IDEA Champion", "VC Award"]
    - year: "2023"
      tagline: "The founding year of BRACU ALTER"
      description: "Where it all began. The inaugural team that established BRACU ALTER under LaSSET, laying the foundation for autonomous rescue robotics research at BRAC University."
      image: "images/posts/pic7.png"
      href: "/team/2023/"
      color: "#FFA500"
      badges: ["Founded", "LaSSET", "First Rover Prototype"]

