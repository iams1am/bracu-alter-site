rovers:
  title: "ALTER Rovers"
  subtitle: "Our lineup of modular rescue rovers engineered for disaster response."
  versions:
    - name: "V1"
      fullName: "ALTER Rover V1"
      tagline: "The original flagship rescue rover"
      description: "Our first modular rescue rover designed for hazardous terrain navigation and real-time situational awareness."
      image: "images/posts/pic1.jpg"
      href: "/agv/v1/"
      badges: ["Modular", "Rescue Robotics", "Autonomy", "Telemetry"]
      color: "#FF4500"
      links:
        - label: "Hardware"
          href: "/agv/v1/#mechanical"
        - label: "Software"
          href: "/agv/v1/#software"
        - label: "Specs"
          href: "/agv/v1/#specs"
    - name: "V2"
      fullName: "ALTER Rover V2"
      tagline: "Enhanced mobility and sensor suite"
      description: "Second generation with improved chassis design, upgraded sensor array, and enhanced autonomy stack."
      image: "images/posts/pic4.png"
      href: "/agv/v2/"
      badges: ["6-DOF Arm", "SLAM", "Thermal Imaging", "Modular"]
      color: "#FF6A00"
      links:
        - label: "Hardware"
          href: "/agv/v2/#mechanical"
        - label: "Software"
          href: "/agv/v2/#software"
        - label: "Specs"
          href: "/agv/v2/#specs"
    - name: "V3"
      fullName: "ALTER Rover V3"
      tagline: "AI-powered search and rescue"
      description: "Third generation featuring deep learning perception, advanced path planning, and multi-robot coordination."
      image: "images/posts/pic5.png"
      href: "/agv/v3/"
      badges: ["Deep Learning", "Multi-Robot", "LiDAR", "Edge AI"]
      color: "#FF8C00"
      links:
        - label: "Hardware"
          href: "/agv/v3/#mechanical"
        - label: "Software"
          href: "/agv/v3/#software"
        - label: "Specs"
          href: "/agv/v3/#specs"
    - name: "V4"
      fullName: "ALTER Rover V4"
      tagline: "Next-gen autonomous platform"
      description: "The latest iteration with full autonomous operation, swarm intelligence, and advanced manipulation capabilities."
      image: "images/posts/pic7.png"
      href: "/agv/v4/"
      badges: ["Swarm AI", "Manipulation", "5G Comms", "Full Autonomy"]
      color: "#FFA500"
